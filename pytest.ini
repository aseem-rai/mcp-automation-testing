[pytest]
addopts =
    --html=test-results/report.html
    --self-contained-html
    --capture=tee-sys
    --tb=short
    -ra
    -v

testpaths = tests

markers =
    smoke: quick smoke tests
    regression: regression suite
    login: login tests
    dashboard: dashboard tests
    resume: resume tests
    jobs: jobs module tests
    prep: prep module tests
    profile: profile tests
    sanity: sanity suite
    negative: negative/invalid-input tests
    upload: resume and JD upload

log_cli = true
log_cli_level = INFO
