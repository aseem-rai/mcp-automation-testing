[pytest]
testpaths = tests
addopts = -ra -v --headless --html=results/report.html --self-contained-html --capture=tee-sys
markers =
    smoke: quick smoke tests
    sanity: sanity suite (fast checks)
    regression: regression suite (full coverage)
    login: login tests
    negative: negative/invalid-input tests
    dashboard: dashboard tests
    resume: resume tests
    profile: profile tests

log_cli = true
log_cli_level = INFO
log_file = results/logs/test.log
log_file_mode = a
log_file_level = INFO
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
