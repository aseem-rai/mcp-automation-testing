# Tests run headed (visible browser) by default. Use --headless when you want no UI.
# Tests run headed (visible browser) by default. Use --headless when you want no UI.
[pytest]
addopts =
    --html=test-results/report.html
    --self-contained-html
    --capture=tee-sys
    --tb=short
    -ra
    -v

testpaths = tests

markers =
    smoke: quick smoke tests
    regression: regression suite
    login: login tests
    dashboard: dashboard tests
    jobs: jobs module tests

log_cli = true
log_cli_level = INFO
